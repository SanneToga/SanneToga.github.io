<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanneToga - 隠しページ</title>
    <link rel="stylesheet" href="./css/style.css" id="theme-style">
    <style>
        /* 隠しページ専用の特別なスタイル */
        :root {
            --bg-color: #333333;
            --text-color: #ffffff;
            --link-color: #ffffff;
            --border-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .header,
        .top-tabs .tab,
        .menu-box ul li a,
        .update-box,
        .content-box,
        .footer {
            border-color: var(--border-color) !important;
        }


        .top-tabs .tab.active {
            background-color: var(--border-color);
            color: var(--bg-color);
        }

        a {
            color: var(--link-color);
            border-bottom-color: var(--border-color);
        }

        a:hover {
            background-color: var(--border-color);
            color: var(--bg-color);
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>⊹₊⋆ 兎賀さんねの隠しページへようこそ！ ✧˖°.</h1>
            <p>welcome to my site.</p>
        </header>

        <nav class="top-tabs">
            <a href="index.html" class="tab">HOME</a>
            <a href="works.html" class="tab">WORKS</a>
            <a href="blog.html" class="tab">BLOG</a>
        </nav>

        <div class="main-wrapper">
            <nav class="sidebar">
                <h3>Link</h3>
                <div class="menu-box">
                    <ul id="dynamic-links"></ul>
                </div>

                <div class="update-box">
                    <h3>Update</h3>
                    <div id="dynamic-update"></div>
                </div>


            </nav>

            <main class="content">
                <section class="content-box">
                    <h2>隠しページ</h2>
                    <p class="small-text"
                        style="font-family: monospace; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px;">
                        2026.05.14
                    </p>

                    <div style="margin-top: 20px;">
                        <p>ここは隠しページです！</p>

                        <p>まだなにもありませんよ。</p>

                        <img src="./img/top.webp" alt="photo_top">
                    </div>

                    <div style="margin-top: 40px; text-align: center;">
                        <a href="index.html">&lt;&lt; HOMEに戻る</a>
                    </div>
                </section>
            </main>
        </div>

        <footer class="footer">
            <p>SanneToga<a href="hidden.html" class="secret-link">.</a></p>
        </footer>
    </div>
    <script src="./js/update.js"></script>
</body>

</html>
