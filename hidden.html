    <link rel="stylesheet" href="./css/style.css" id="theme-style">
    <style>
        /* 隠しページ専用の特別なスタイル：サイト全体を反転させる */
        :root {
            --bg-color: #333333;
            --text-color: #ffffff;
            --link-color: #ffffff;
            --border-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .header,
        .top-tabs .tab,
        .menu-box ul li a,
        .update-box,
        .content-box,
        .visual-frame,
        .frame-header,
        .footer {
            border-color: var(--border-color) !important;
        }

        .visual-frame,
        .frame-header {
            background-color: var(--bg-color) !important;
        }

        .frame-header {
            border-bottom: 1px dotted var(--border-color) !important;
        }

        .frame-title,
        .frame-caption {
            color: var(--text-color) !important;
        }

        .frame-caption {
            border-top: 1px dotted var(--border-color) !important;
        }

        .top-tabs .tab.active {
            background-color: var(--border-color);
            color: var(--bg-color);
        }

        a {
            color: var(--link-color);
            border-bottom-color: var(--border-color);
        }

        a:hover {
            background-color: var(--border-color);
            color: var(--bg-color);
        }
    </style>
</head>
